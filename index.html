<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CruxLang Compiler</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }
        
        .editor-section, .output-section {
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: "▶";
            margin-right: 8px;
            color: #3498db;
        }
        
        #code-editor {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            background: #fafafa;
            color: #333;
        }
        
        #code-editor:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #run-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        #run-btn:active {
            transform: translateY(0);
        }
        
        #run-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        #output {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: #f8f9fa;
            color: #333;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .example-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .example-btn:hover {
            background: #d5dbdb;
            border-color: #95a5a6;
        }
        
        .footer {
            background: #f8f9fa;
            padding: 15px 20px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 CruxLang Compiler</h1>
            <p>Your own programming language - Write, compile, and run code</p>
        </div>
        
        <div class="main-content">
            <div class="editor-section">
                <div class="section-title">Code Editor</div>
                <textarea id="code-editor" placeholder="Enter your CruxLang code here...">// Welcome to CruxLang!
// Try some examples:

// Hello World
emit "Hello, CruxLang!";

// Variables and arithmetic
let x = 10;
let y = 5;
emit x + y;

// Functions
let factorial = func(n) {
    if (n <= 1) {
        return 1;
    } else {
        return n * factorial(n - 1);
    }
};

emit factorial(5);</textarea>
                
                <div class="controls">
                    <button id="run-btn" onclick="runCode()">
                        <span>▶</span>
                        Run Code
                    </button>
                    <div id="status" class="status" style="display: none;"></div>
                </div>
                
                <div style="margin-top: 15px;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 8px;">Quick Examples:</div>
                    <div class="example-buttons">
                        <button class="example-btn" onclick="loadExample('hello')">Hello World</button>
                        <button class="example-btn" onclick="loadExample('arithmetic')">Arithmetic</button>
                        <button class="example-btn" onclick="loadExample('factorial')">Factorial</button>
                        <button class="example-btn" onclick="loadExample('fibonacci')">Fibonacci</button>
                    </div>
                </div>
            </div>
            
            <div class="output-section">
                <div class="section-title">Output</div>
                <div id="output">Ready to run code! Click the "Run Code" button to execute your CruxLang program.</div>
            </div>
        </div>
        
        <div class="footer">
            <p>Built with Rust • Powered by your imagination</p>
        </div>
    </div>

    <script>
        const examples = {
            hello: `// Simple Hello World\nemit "Hello, CruxLang!";`,
            
            arithmetic: `// Basic arithmetic operations\nlet a = 10;\nlet b = 5;\nemit a + b;\nemit a - b;\nemit a * b;\nemit a / b;`,
            
            factorial: `// Recursive factorial function\nfunc factorial(n) {\n    if (n <= 1) {\n        return 1;\n    } else {\n        return n * factorial(n - 1);\n    }\n}\nemit factorial(5);\nemit factorial(10);`,
            
            fibonacci: `// Fibonacci sequence\nfunc fibonacci(n) {\n    if (n <= 1) {\n        return n;\n    } else {\n        return fibonacci(n - 1) + fibonacci(n - 2);\n    }\n}\n\nemit "Fibonacci sequence:";\nlet i = 0;\nwhile (i < 10) {\n    emit fibonacci(i);\n    i = i + 1;\n}`
        };

        function loadExample(name) {
            const editor = document.getElementById('code-editor');
            editor.value = examples[name] || '// Example not found';
        }

        async function runCode() {
            const codeEditor = document.getElementById('code-editor');
            const output = document.getElementById('output');
            const runBtn = document.getElementById('run-btn');
            const status = document.getElementById('status');
            
            const code = codeEditor.value.trim();
            if (!code) {
                showStatus('Please enter some code to run', 'error');
                return;
            }
            
            // Show loading state
            runBtn.disabled = true;
            showStatus('Running code...', 'loading');
            output.textContent = 'Executing...';
            
            try {
                const response = await fetch('http://127.0.0.1:3000/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code: code })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.error) {
                    output.textContent = `Error: ${result.error}`;
                    showStatus('Execution failed', 'error');
                } else {
                    output.textContent = result.output || 'Code executed successfully! (No output generated)';
                    showStatus('Code executed successfully', 'success');
                }
            } catch (error) {
                output.textContent = `Connection error: ${error.message}\n\nMake sure the CruxLang server is running on http://127.0.0.1:3000`;
                showStatus('Connection failed', 'error');
            } finally {
                runBtn.disabled = false;
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            // Hide status after 3 seconds for success/error
            if (type !== 'loading') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
        
        // Allow running code with Ctrl+Enter
        document.getElementById('code-editor').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });
    </script>
</body>
</html>
